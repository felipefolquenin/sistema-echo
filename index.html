function isoWeek(date){const d=new Date(date);d.setHours(0,0,0,0);d.setDate(d.getDate()+4-(d.getDay()||7));return Math.ceil((((d-new Date(d.getFullYear(),0,1))/86400000)+1)/7);}
function isOn(svc,date){const ag=svc.agendamento;if(!ag)return false;if(svc.freq==="Mensal")return ag.diaMes===date.getDate();if(!ag.diasSemana||!ag.diasSemana.includes(date.getDay()))return false;if(svc.freq==="Semanal")return true;const w=isoWeek(date);return ag.semPar==="par"?w%2===0:w%2===1;}
function schedTxt(svc){const ag=svc.agendamento;if(!ag)return"";if(svc.freq==="Mensal")return"Dia "+ag.diaMes;if(!ag.diasSemana||!ag.diasSemana.length)return"";const dias=ag.diasSemana.map(d=>WDS[d]).join(", ");return svc.freq==="Quinzenal"?dias+" · "+(ag.semPar==="par"?"sem. pares":"sem. ímpares"):dias;}
function getVisits(conds,days=7){const list=[],h=new Date();h.setHours(0,0,0,0);conds.filter(c=>c.ativo!==false).forEach(cond=>{for(let i=1;i<=days;i++){const d=new Date(h);d.setDate(h.getDate()+i);d.setHours(0,0,0,0);(cond.servicos||[]).forEach(svc=>{if(isOn(svc,d))list.push({cond,svc,date:new Date(d)});});}});return list.sort((a,b)=>a.date-b.date);}
async function sendEmail(p){return fetch("https://api.emailjs.com/api/v1.0/email/send",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({service_id:EJS_SVC,template_id:EJS_TPL,user_id:EJS_KEY,template_params:p})});}
async function compressImage(file,maxW=900,q=0.72){return new Promise(res=>{const reader=new FileReader();reader.onload=e=>{const img=new Image();img.onload=()=>{const sc=Math.min(1,maxW/img.width);const c=document.createElement("canvas");c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);c.getContext("2d").drawImage(img,0,0,c.width,c.height);res(c.toDataURL("image/jpeg",q));};img.src=e.target.result;};reader.readAsDataURL(file);});}

const inp={background:G.c50,border:"1.5px solid "+G.c100,borderRadius:"9px",padding:".65rem .9rem",fontSize:".88rem",fontFamily:"inherit",color:G.g800,outline:"none",width:"100%",boxSizing:"border-box"};

function Btn({onClick,children,bg=G.c800,style={}}){return <button onClick={onClick} style={{background:bg,color:"#fff",border:"none",borderRadius:"100px",padding:".72rem 1.5rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:".9rem",...style}}>{children}</button>;}
function BackBtn({onClick}){return <button onClick={onClick} style={{background:"none",border:"none",color:G.c700,cursor:"pointer",fontWeight:600,fontSize:".85rem",marginBottom:"1.2rem",display:"flex",alignItems:"center",gap:".4rem",fontFamily:"inherit"}}>← Voltar</button>;}
function Empty({icon="📋",title,sub=""}){return <div style={{textAlign:"center",padding:"3rem 1rem",background:"#fff",borderRadius:"14px",border:"1.5px dashed "+G.g200,color:G.g400}}><div style={{fontSize:"2.5rem",marginBottom:".8rem"}}>{icon}</div><div style={{fontWeight:700,color:G.g600,marginBottom:".3rem"}}>{title}</div>{sub&&<div style={{fontSize:".83rem"}}>{sub}</div>}</div>;}
function PBadge({plano="Essencial"}){const p=PLANOS[plano]||PLANOS.Essencial;return <span style={{fontSize:".7rem",fontWeight:700,padding:".18rem .6rem",borderRadius:"100px",background:p.bg,color:p.c,whiteSpace:"nowrap"}}>{p.ico} {plano}</span>;}
function SBadge({status}){const s=STATUS[status]||STATUS.pending;return <span style={{fontSize:".72rem",fontWeight:700,padding:".2rem .65rem",borderRadius:"100px",background:s.bg,color:s.c,whiteSpace:"nowrap"}}>{s.i} {s.l}</span>;}

function ImagePicker({value,onChange,label="Foto",tag=""}){
  const ref=useRef();
  const [loading,setLoading]=useState(false);
  async function handle(e){const f=e.target.files[0];if(!f)return;setLoading(true);const compressed=await compressImage(f);onChange(compressed);setLoading(false);}
  return(
    <div>
      <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={handle}/>
      <div onClick={()=>!loading&&ref.current.click()} style={{cursor:"pointer",borderRadius:"10px",overflow:"hidden",border:"2px dashed "+(value?G.c400:G.g200),background:value?"#000":G.c50,minHeight:"120px",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
        {loading&&<div style={{color:G.c400,fontSize:".85rem",fontWeight:600}}>Comprimindo...</div>}
        {!loading&&value&&<div style={{width:"100%",position:"relative"}}><img src={value} alt={label} style={{width:"100%",aspectRatio:"4/3",objectFit:"cover",display:"block"}}/>{tag&&<div style={{position:"absolute",bottom:"8px",left:"8px",background:tag==="ANTES"?"rgba(0,0,0,.7)":"rgba(45,106,79,.85)",color:"#fff",fontSize:".68rem",fontWeight:700,padding:".2rem .6rem",borderRadius:"100px"}}>{tag}</div>}<div style={{position:"absolute",top:"8px",right:"8px",background:"rgba(0,0,0,.55)",color:"#fff",fontSize:".72rem",fontWeight:600,padding:".25rem .7rem",borderRadius:"100px"}}>📷 Trocar</div></div>}
        {!loading&&!value&&<div style={{textAlign:"center",padding:"1.5rem 1rem"}}><div style={{fontSize:"2rem",marginBottom:".4rem"}}>📷</div><div style={{fontSize:".85rem",fontWeight:700,color:G.g600,marginBottom:".2rem"}}>{label}</div><div style={{fontSize:".74rem",color:G.g400}}>Toque para abrir a galeria</div></div>}
      </div>
    </div>
  );
}

// ── LOCAL STORAGE ─────────────────────────────────
function lsGet(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// ── APP ───────────────────────────────────────────
function App(){
  const [view,setView]=useState("home");
  const [conds,setConds]=useState([]);
  const [feitos,setFeitos]=useState({});
  const [notifs,setNotifs]=useState({});
  const [complaints,setComplaints]=useState([]);
  const [posts,setPosts]=useState([]);
  const [settings,setSettings]=useState(DEF);
  const [blogCondo,setBlogCondo]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    setConds(lsGet("u-conds")||[]);
    setFeitos(lsGet("u-feitos:"+mesKey())||{});
    setNotifs(lsGet("u-notifs")||{});
    setComplaints(lsGet("u-complaints")||[]);
    setPosts(lsGet("u-posts")||[]);
    const s=lsGet("u-settings");if(s)setSettings({...DEF,...s});
    setLoading(false);
  },[]);

  function saveConds(d){setConds(d);lsSet("u-conds",d);}
  function saveFeitos(d){setFeitos(d);lsSet("u-feitos:"+mesKey(),d);}
  function saveNotifs(d){setNotifs(d);lsSet("u-notifs",d);}
  function saveComplaints(d){setComplaints(d);lsSet("u-complaints",d);}
  function savePosts(d){setPosts(d);lsSet("u-posts",d);}
  function saveSettings(d){setSettings(d);lsSet("u-settings",d);}

  if(loading)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:G.c900,color:G.c400,fontFamily:"inherit"}}>🌿 Carregando...</div>;

  const shared={conds,feitos,notifs,complaints,posts,settings,saveConds,saveFeitos,saveNotifs,saveComplaints,savePosts,saveSettings,setView};
  return(
    <div style={{fontFamily:"Inter,sans-serif",background:G.c50,minHeight:"100vh"}}>
      {view==="home"&&<Home setView={setView}/>}
      {view==="complaint"&&<ComplaintForm {...shared}/>}
      {view==="access"&&<BlogAccess conds={conds} setBlogCondo={setBlogCondo} setView={setView}/>}
      {view==="blog"&&<Blog condo={blogCondo} posts={posts} complaints={complaints} setView={setView}/>}
      {view==="admin-login"&&<AdminLogin settings={settings} saveSettings={saveSettings} setView={setView}/>}
      {view==="admin"&&<Admin {...shared}/>}
    </div>
  );
}

function ComplaintForm({conds,complaints,saveComplaints,setView}){
  const [condoId,setCondoId]=useState("");const [name,setName]=useState("");const [apt,setApt]=useState("");const [desc,setDesc]=useState("");const [photoUrl,setPhotoUrl]=useState("");const [sent,setSent]=useState(false);const [code,setCode]=useState("");const [err,setErr]=useState("");
  function submit(){if(!condoId){setErr("Selecione o condomínio");return;}if(!name.trim()){setErr("Digite seu nome");return;}if(!apt.trim()){setErr("Digite seu apartamento");return;}if(!desc.trim()){setErr("Descreva a reclamação");return;}const id=uid();saveComplaints([...complaints,{id,condoId,name,apt,desc,photoUrl,status:"pending",date:new Date().toISOString(),adminNote:""}]);setCode(id);setSent(true);}

  return(
    <div style={{maxWidth:"520px",margin:"0 auto",padding:"1.5rem 1.2rem"}}>
      <BackBtn onClick={()=>setView("home")}/>
      <h2 style={{color:G.c800,fontSize:"1.15rem",fontWeight:800,marginBottom:".3rem"}}>📝 Registrar Reclamação</h2>
      <p style={{color:G.g600,fontSize:".85rem",marginBottom:"1.5rem"}}>Sem necessidade de cadastro.</p>
      <div style={{display:"flex",flexDirection:"column",gap:".85rem"}}>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".7rem"}}>

        </div>
        <div><label style={lbl}>Descrição *</label><textarea style={{...inp,resize:"vertical",minHeight:"90px"}} value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Descreva o problema..."/></div>
        <div><label style={lbl}>Foto (opcional)</label><ImagePicker value={photoUrl} onChange={setPhotoUrl} label="Adicionar foto do problema"/>{photoUrl&&<button onClick={()=>setPhotoUrl("")} style={{marginTop:".3rem",background:"none",border:"none",color:"#ef4444",fontSize:".75rem",cursor:"pointer",fontFamily:"inherit"}}>✕ Remover foto</button>}</div>
        {err&&<div style={{background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:"9px",padding:".7rem 1rem",color:"#b91c1c",fontSize:".85rem"}}>{err}</div>}

function BlogAccess({conds,setBlogCondo,setView}){
  const [code,setCode]=useState("");const [err,setErr]=useState("");
  function enter(){const found=conds.find(c=>c.code===code.trim().toLowerCase());if(!found){setErr("Código incorreto.");return;}setBlogCondo(found);setView("blog");}
  return(<div style={{maxWidth:"400px",margin:"0 auto",padding:"2.5rem 1.2rem",textAlign:"center"}}><BackBtn onClick={()=>setView("home")}/><div style={{background:"#fff",borderRadius:"16px",padding:"2rem",border:"1.5px solid "+G.c100,boxShadow:"0 2px 12px rgba(0,0,0,.06)"}}><div style={{fontSize:"2.5rem",marginBottom:"1rem"}}>🔐</div><h2 style={{color:G.c800,fontSize:"1.05rem",fontWeight:800,marginBottom:".4rem"}}>Portal dos Moradores</h2><p style={{color:G.g600,fontSize:".85rem",marginBottom:"1.5rem",lineHeight:1.65}}>Digite o código de acesso do seu condomínio.</p><input style={{...inp,textAlign:"center",fontSize:"1.05rem",letterSpacing:".12em",fontWeight:700,marginBottom:".9rem"}} value={code} onChange={e=>{setCode(e.target.value);setErr("");}} placeholder="Código" onKeyDown={e=>{if(e.key==="Enter")enter();}}/>{err&&<div style={{color:"#ef4444",fontSize:".82rem",marginBottom:".9rem"}}>{err}</div>}<Btn onClick={enter} style={{width:"100%"}}>Entrar →</Btn></div></div>);
}

function EditComplaint({complaint,onSave}){
  const [status,setStatus]=useState(complaint.status);const [note,setNote]=useState(complaint.adminNote||"");
  return(<div style={{padding:"1rem 1.1rem",borderTop:"1px solid "+G.c50,background:G.c50}}><div style={{marginBottom:".7rem"}}><label style={lbl}>Status</label><div style={{display:"flex",gap:".4rem",flexWrap:"wrap"}}>{Object.entries(STATUS).map(entry=>{const v=entry[0];const s=entry[1];return <button key={v} onClick={()=>setStatus(v)} style={{padding:".35rem .75rem",borderRadius:"100px",border:"1.5px solid "+(status===v?s.c:G.g200),background:status===v?s.bg:"#fff",color:status===v?s.c:G.g600,fontSize:".78rem",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{s.i} {s.l}</button>;})}</div></div><div style={{marginBottom:".8rem"}}><label style={lbl}>Resposta para o morador</label><textarea style={{...inp,resize:"vertical",minHeight:"70px"}} value={note} onChange={e=>setNote(e.target.value)} placeholder="Ex: Serviço realizado em 15/06..."/></div><Btn onClick={()=>onSave({status,adminNote:note})} style={{padding:".6rem 1.4rem",fontSize:".85rem"}}>💾 Salvar</Btn></div>);
}

function ResultadosTab({conds,posts,savePosts}){
  const [condoId,setCondoId]=useState("");const [title,setTitle]=useState("");const [desc,setDesc]=useState("");const [beforeUrl,setBeforeUrl]=useState("");const [afterUrl,setAfterUrl]=useState("");
  const sorted=[...posts].sort((a,b)=>new Date(b.date)-new Date(a.date));
  function publish(){if(!condoId||!title.trim())return;savePosts([...posts,{id:uid(),condoId,title,desc,beforeUrl,afterUrl,date:new Date().toISOString()}]);setCondoId("");setTitle("");setDesc("");setBeforeUrl("");setAfterUrl("");}
  return(<div><div style={{background:"#fff",borderRadius:"14px",border:"1.5px solid "+G.g200,padding:"1.3rem",marginBottom:"1.3rem",boxShadow:"0 2px 10px rgba(0,0,0,.06)"}}><h3 style={{color:G.c800,fontWeight:800,fontSize:".95rem",marginBottom:"1.1rem"}}>📸 Nova Publicação — Antes & Depois</h3><div style={{display:"flex",flexDirection:"column",gap:".8rem"}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".7rem"}}><div><label style={lbl}>Condomínio *</label><select style={inp} value={condoId} onChange={e=>setCondoId(e.target.value)}><option value="">Selecione</option>{conds.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}</select></div><div><label style={lbl}>Título *</label><input style={inp} value={title} onChange={e=>setTitle(e.target.value)} placeholder="Ex: Corte de grama realizado"/></div></div><div><label style={lbl}>Descrição</label><textarea style={{...inp,resize:"vertical",minHeight:"75px"}} value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Descreva o serviço..."/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".7rem"}}><div><label style={lbl}>🟡 Foto de Antes</label><ImagePicker value={beforeUrl} onChange={setBeforeUrl} label="Adicionar foto de antes" tag="ANTES"/>{beforeUrl&&<button onClick={()=>setBeforeUrl("")} style={{marginTop:".3rem",background:"none",border:"none",color:"#ef4444",fontSize:".75rem",cursor:"pointer",fontFamily:"inherit"}}>✕ Remover</button>}</div><div><label style={lbl}>🟢 Foto de Depois</label><ImagePicker value={afterUrl} onChange={setAfterUrl} label="Adicionar foto de depois" tag="DEPOIS"/>{afterUrl&&<button onClick={()=>setAfterUrl("")} style={{marginTop:".3rem",background:"none",border:"none",color:"#ef4444",fontSize:".75rem",cursor:"pointer",fontFamily:"inherit"}}>✕ Remover</button>}</div></div><Btn onClick={publish} style={{width:"100%",borderRadius:"9px"}}>📤 Publicar</Btn></div></div>{sorted.length>0&&<div><div style={{fontSize:".82rem",color:G.g600,fontWeight:600,marginBottom:".75rem"}}>Publicações ({sorted.length})</div><div style={{display:"flex",flexDirection:"column",gap:".6rem"}}>{sorted.map(p=>{const cd=conds.find(x=>x.id===p.condoId);return(<div key={p.id} style={{background:"#fff",borderRadius:"10px",border:"1.5px solid "+G.g200,padding:".8rem 1rem",display:"flex",alignItems:"center",gap:".8rem",boxShadow:"0 1px 4px rgba(0,0,0,.04)"}}><div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,color:G.c800,fontSize:".87rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.title}</div><div style={{fontSize:".72rem",color:G.g400,marginTop:".1rem"}}>{cd?cd.nome:"—"} · {fmt(p.date)}</div></div><button onClick={()=>savePosts(posts.filter(x=>x.id!==p.id))} style={{background:"#fff5f5",border:"1.5px solid #fecaca",color:"#ef4444",borderRadius:"8px",padding:".3rem .6rem",fontSize:".78rem",cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>🗑️</button></div>);})}</div></div>}</div>);
}

function CondominiosTab({conds,saveConds}){
  const [form,setForm]=useState(null);const [fSvcs,setFSvcs]=useState([]);const [selDays,setSelDays]=useState([]);const [selPar,setSelPar]=useState("impar");const [fPlano,setFPlano]=useState("Essencial");
  function openForm(c=null){setForm(c||{id:"",nome:"",endereco:"",contato:"",telefone:"",ativo:true,plano:"Essencial",code:codeGen(),servicos:[]});setFSvcs(c?[...c.servicos]:[]);setFPlano(c?c.plano||"Essencial":"Essencial");setSelDays([]);setSelPar("impar");}
  function closeForm(){setForm(null);}
  function saveForm(){if(!form.nome.trim())return;const c={...form,plano:fPlano,servicos:fSvcs};saveConds(c.id?conds.map(x=>x.id===c.id?c:x):[...conds,{...c,id:uid()}]);closeForm();}
  function addSvc(freq,svcNome){const f2=freq||"Semanal";const ag=f2==="Mensal"?{diaMes:1}:{diasSemana:[...selDays],semPar:selPar};setFSvcs(prev=>[...prev,{nome:svcNome,freq:f2,agendamento:ag}]);setSelDays([]);}
  function remSvc(i){setFSvcs(prev=>prev.filter((_,j)=>j!==i));}
  function togDay(d){setSelDays(prev=>prev.includes(d)?prev.filter(x=>x!==d):[...prev,d].sort((a,b)=>a-b));}
  return(<div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.1rem"}}><div style={{fontSize:".83rem",color:G.g600}}>{conds.length} condomínio{conds.length!==1?"s":""}</div><Btn onClick={()=>openForm()} style={{padding:".55rem 1.1rem",fontSize:".84rem"}}>+ Novo</Btn></div>{!conds.length?<Empty icon="🏢" title="Nenhum condomínio ainda" sub='Clique em "+ Novo" para começar'/>:<div style={{display:"flex",flexDirection:"column",gap:".75rem"}}>{conds.map(c=>(<div key={c.id} style={{background:"#fff",borderRadius:"12px",border:"1.5px solid "+G.g200,padding:"1rem 1.2rem",display:"flex",alignItems:"center",gap:"1rem",boxShadow:"0 1px 6px rgba(0,0,0,.04)"}}><div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:".9rem",color:G.c800}}>{c.nome}</div>{c.endereco&&<div style={{fontSize:".73rem",color:G.g400,marginTop:".1rem"}}>📍 {c.endereco}</div>}<div style={{fontSize:".73rem",marginTop:".28rem",display:"flex",alignItems:"center",gap:".45rem",flexWrap:"wrap"}}><PBadge plano={c.plano}/><span style={{color:G.c500,fontWeight:600}}>{(c.servicos||[]).length} serviço{(c.servicos||[]).length!==1?"s":""}</span><span style={{color:G.g400}}>Código: <strong style={{color:G.c700}}>{c.code}</strong></span></div></div><div style={{display:"flex",gap:".4rem",flexShrink:0}}><button onClick={()=>openForm(c)} style={{background:G.c50,border:"1.5px solid "+G.c200,color:G.c700,borderRadius:"8px",padding:".38rem .7rem",fontSize:".78rem",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>✏️</button><button onClick={()=>{if(confirm("Remover?"))saveConds(conds.filter(x=>x.id!==c.id));}} style={{background:"#fff5f5",border:"1.5px solid #fecaca",color:"#ef4444",borderRadius:"8px",padding:".38rem .7rem",fontSize:".78rem",cursor:"pointer",fontFamily:"inherit"}}>🗑️</button></div></div>))}</div>}
  {form&&<div onClick={e=>{if(e.target===e.currentTarget)closeForm();}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:999,display:"flex",alignItems:"flex-end",justifyContent:"center"}}><div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"1.5rem",width:"100%",maxWidth:"520px",maxHeight:"93vh",overflowY:"auto"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.2rem"}}><h2 style={{fontSize:"1rem",fontWeight:800,color:G.c800}}>{form.id?"✏️ Editar":"🏢 Novo"} Condomínio</h2><button onClick={closeForm} style={{background:"none",border:"none",fontSize:"1.4rem",cursor:"pointer",color:"#aaa",lineHeight:1}}>✕</button></div><div style={{display:"flex",flexDirection:"column",gap:".85rem"}}><div><label style={lbl}>Nome *</label><input style={inp} value={form.nome} onChange={e=>setForm(f=>({...f,nome:e.target.value}))} placeholder="Condomínio das Flores"/></div><div><label style={lbl}>Endereço</label><input style={inp} value={form.endereco||""} onChange={e=>setForm(f=>({...f,endereco:e.target.value}))} placeholder="Rua, número, bairro"/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".7rem"}}><div><label style={lbl}>Contato</label><input style={inp} value={form.contato||""} onChange={e=>setForm(f=>({...f,contato:e.target.value}))} placeholder="Síndico"/></div><div><label style={lbl}>Telefone</label><input style={inp} value={form.telefone||""} onChange={e=>setForm(f=>({...f,telefone:e.target.value}))} placeholder="(42) 9..."/></div></div><div><label style={lbl}>Plano Contratado</label><div style={{display:"flex",flexDirection:"column",gap:".4rem",marginTop:".4rem"}}>{Object.entries(PLANOS).map(entry=>{const k=entry[0];const p=entry[1];const on=fPlano===k;return(<button key={k} onClick={()=>setFPlano(k)} style={{display:"flex",alignItems:"center",gap:".8rem",padding:".7rem",borderRadius:"10px",border:"1.5px solid "+(on?p.c:G.g200),background:on?p.bg:"#fff",cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}><span style={{fontSize:"1.2rem"}}>{p.ico}</span><div style={{flex:1}}><div style={{fontWeight:700,fontSize:".85rem",color:on?p.c:G.c800}}>{k}</div></div><div style={{width:"16px",height:"16px",borderRadius:"50%",border:"2px solid "+(on?p.c:G.g200),background:on?p.c:"#fff",position:"relative",flexShrink:0}}>{on&&<div style={{position:"absolute",inset:"3px",borderRadius:"50%",background:"#fff"}}/>}</div></button>);})}</div></div><div><label style={lbl}>Código de Acesso do Portal</label><div style={{display:"flex",gap:".5rem",alignItems:"center"}}><input style={{...inp,flex:1,letterSpacing:".08em",fontWeight:700}} value={form.code||""} onChange={e=>setForm(f=>({...f,code:e.target.value}))}/><button onClick={()=>setForm(f=>({...f,code:codeGen()}))} style={{background:G.c50,border:"1.5px solid "+G.c200,color:G.c700,borderRadius:"9px",padding:".65rem .9rem",cursor:"pointer",fontFamily:"inherit",fontSize:".8rem",fontWeight:600,flexShrink:0,whiteSpace:"nowrap"}}>🔄 Gerar</button></div><div style={{fontSize:".72rem",color:G.g400,marginTop:".3rem"}}>Compartilhe com os moradores para acesso ao portal</div></div><SvcForm fSvcs={fSvcs} selDays={selDays} selPar={selPar} togDay={togDay} setSelPar={setSelPar} addSvc={addSvc} remSvc={remSvc}/><label style={{display:"flex",alignItems:"center",gap:".6rem",cursor:"pointer"}}><input type="checkbox" checked={form.ativo!==false} onChange={e=>setForm(f=>({...f,ativo:e.target.checked}))} style={{width:"16px",height:"16px",cursor:"pointer",accentColor:G.c500}}/><span style={{fontSize:".85rem",fontWeight:600,color:G.g600}}>Condomínio ativo</span></label><div style={{display:"flex",gap:".7rem"}}><button onClick={closeForm} style={{flex:1,background:"none",border:"1.5px solid "+G.g200,color:G.g600,borderRadius:"100px",padding:".75rem",fontSize:".88rem",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Cancelar</button><Btn onClick={saveForm} style={{flex:2,borderRadius:"100px",padding:".75rem",fontSize:".88rem"}}>💾 Salvar</Btn></div></div></div></div>}</div>);
}

function SvcForm({fSvcs,selDays,selPar,togDay,setSelPar,addSvc,remSvc}){
  const [svcNome,setSvcNome]=useState(ALL_SVCS[0]);const [freq,setFreq]=useState("Semanal");
  return(<div style={{borderTop:"1px solid "+G.g200,paddingTop:".85rem"}}><label style={lbl}>Serviços Contratados</label>{!fSvcs.length&&<div style={{fontSize:".8rem",color:G.g400,marginBottom:".6rem"}}>Nenhum serviço adicionado</div>}<div style={{display:"flex",flexDirection:"column",gap:".4rem",marginBottom:".6rem"}}>{fSvcs.map((s,i)=>(<div key={i} style={{display:"flex",alignItems:"flex-start",gap:".6rem",background:G.c50,borderRadius:"9px",padding:".6rem .9rem",border:"1px solid "+G.c100}}><div style={{flex:1}}><div style={{fontSize:".84rem",fontWeight:700,color:G.c800}}>{s.nome}</div><div style={{fontSize:".73rem",color:G.c500,marginTop:".1rem"}}>{s.freq}{schedTxt(s)?" · "+schedTxt(s):""}</div></div><button onClick={()=>remSvc(i)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:"1rem",lineHeight:1,flexShrink:0}}>✕</button></div>))}</div><div style={{background:"#f9fffe",border:"1.5px solid "+G.c100,borderRadius:"12px",padding:".9rem"}}><div style={{fontSize:".72rem",fontWeight:700,color:G.c700,marginBottom:".6rem",textTransform:"uppercase",letterSpacing:".04em"}}>Adicionar serviço</div><div style={{display:"flex",gap:".4rem",marginBottom:".6rem"}}><select style={{...inp,flex:2}} value={svcNome} onChange={e=>setSvcNome(e.target.value)}>{ALL_SVCS.map(s=><option key={s} value={s}>{s}</option>)}</select><select style={{...inp,flex:1}} value={freq} onChange={e=>setFreq(e.target.value)}><option>Semanal</option><option>Quinzenal</option><option>Mensal</option></select></div>{freq!=="Mensal"&&<div style={{marginBottom:".6rem"}}><div style={{fontSize:".72rem",color:G.g600,marginBottom:".4rem",fontWeight:600}}>Dias da semana:</div><div style={{display:"flex",gap:".28rem",flexWrap:"wrap",marginBottom:freq==="Quinzenal"?".5rem":"0"}}>{WDS.map((d,i)=><button key={i} onClick={()=>togDay(i)} style={{padding:".32rem .45rem",borderRadius:"7px",border:"1.5px solid "+(selDays.includes(i)?G.c500:G.g200),background:selDays.includes(i)?G.c500:"#fff",color:selDays.includes(i)?"#fff":G.g600,fontSize:".73rem",fontWeight:selDays.includes(i)?700:500,cursor:"pointer",minWidth:"36px",fontFamily:"inherit"}}>{d}</button>)}{freq==="Quinzenal"&&<div style={{display:"flex",gap:".4rem",width:"100%",marginTop:".3rem"}}><button onClick={()=>setSelPar("impar")} style={{flex:1,padding:".38rem",borderRadius:"7px",border:"1.5px solid "+(selPar==="impar"?G.c500:G.g200),background:selPar==="impar"?G.c500:"#fff",color:selPar==="impar"?"#fff":G.g600,fontSize:".72rem",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Sem. ímpares</button><button onClick={()=>setSelPar("par")} style={{flex:1,padding:".38rem",borderRadius:"7px",border:"1.5px solid "+(selPar==="par"?G.c500:G.g200),background:selPar==="par"?G.c500:"#fff",color:selPar==="par"?"#fff":G.g600,fontSize:".72rem",fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Sem. pares</button></div>}</div>}</div><button onClick={()=>addSvc(freq,svcNome)} style={{width:"100%",background:G.c800,color:"#fff",border:"none",borderRadius:"9px",padding:".65rem",cursor:"pointer",fontWeight:700,fontSize:".85rem",fontFamily:"inherit"}}>+ Adicionar serviço</button></div></div>);
}

function ConfigTab({settings,saveSettings,setView}){
  const [pw,setPw]=useState("");const [newPw,setNewPw]=useState("");const [msg,setMsg]=useState("");
  function savePw(){if(pw!==settings.adminPassword){setMsg("Senha atual incorreta");return;}if(!newPw.trim()){setMsg("Digite a nova senha");return;}saveSettings({...settings,adminPassword:newPw});setPw("");setNewPw("");setMsg("✅ Senha alterada!");setTimeout(()=>setMsg(""),3000);}
  return(<div style={{display:"flex",flexDirection:"column",gap:"1.3rem"}}><div style={{background:"#fff",borderRadius:"14px",border:"1.5px solid "+G.g200,padding:"1.3rem",boxShadow:"0 1px 6px rgba(0,0,0,.04)"}}><h3 style={{color:G.c800,fontWeight:800,fontSize:".92rem",marginBottom:"1rem"}}>🔑 Alterar Senha de Admin</h3><div style={{display:"flex",flexDirection:"column",gap:".7rem"}}><div><label style={lbl}>Senha atual</label><input type="password" style={inp} value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••"/></div><div><label style={lbl}>Nova senha</label><input type="password" style={inp} value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="••••••••"/></div>{msg&&<div style={{fontSize:".83rem",color:msg.startsWith("✅")?G.c700:"#ef4444"}}>{msg}</div>}<Btn onClick={savePw} style={{width:"100%",borderRadius:"9px"}}>Alterar Senha</Btn></div></div><div style={{background:"#fff",borderRadius:"14px",border:"1.5px solid "+G.g200,padding:"1.3rem",boxShadow:"0 1px 6px rgba(0,0,0,.04)"}}><h3 style={{color:G.c800,fontWeight:800,fontSize:".92rem",marginBottom:".5rem"}}>🌿 Portal Público</h3><p style={{fontSize:".85rem",color:G.g600,lineHeight:1.65,marginBottom:"1rem"}}>Moradores acessam com o código de cada condomínio, cadastrado na aba Condomínios.</p><Btn onClick={()=>setView("home")} style={{padding:".6rem 1.2rem",fontSize:".85rem"}}>Ver Portal Público →</Btn></div></div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
